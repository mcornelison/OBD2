# ==============================================================================
# File:    journald-persistent.conf
# Purpose: systemd-journald drop-in that flips Storage=auto -> Storage=persistent
# Author:  Rex (Ralph Agent)
# Created: 2026-04-20 — Sprint 16 US-210 (CIO Session 6 directive 1)
#
# Why
# ---
# The Pi's default journald storage is `auto`: journal lives on tmpfs if
# /var/log/journal does not exist, which means a power-loss or service crash
# takes the logs with it. Spool's Session 6 drill hit exactly this: the
# post-drive post-mortem was impossible because the journal was ephemeral.
#
# Setting Storage=persistent makes systemd-journald create /var/log/journal
# on first start and keep every log across reboots. Operationally this is a
# prerequisite for the BT-resilient collector (US-211) and the power-down
# orchestrator (US-216) — both produce diagnostic output that only matters
# if it survives a Pi hard-crash.
#
# Installation
# ------------
# Installed by deploy/deploy-pi.sh as:
#   /etc/systemd/journald.conf.d/99-obd-persistent.conf
# Then: systemctl restart systemd-journald
# Idempotent: re-running the installer produces the same drop-in content.
#
# Drop-in vs. edit of /etc/systemd/journald.conf
# ----------------------------------------------
# Drop-in wins over editing the base file:
#   1. Survives apt upgrades of systemd (base file stays untouched).
#   2. Idempotent install is a simple file-content compare, not a sed.
#   3. Clear provenance: every setting in /etc/systemd/journald.conf.d/
#      is ours; the base file is vendor-owned.
#
# Storage= reference (from man systemd-journald):
#   volatile    - /run/log/journal only; lost on reboot
#   persistent  - /var/log/journal created + used; survives reboot
#   auto        - persistent if /var/log/journal exists, else volatile (DEFAULT)
#   none        - all logs dropped
# ==============================================================================

[Journal]
Storage=persistent
