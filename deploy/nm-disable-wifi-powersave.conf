# nm-disable-wifi-powersave.conf -- canonical source for the Pi 5 NetworkManager
# WiFi power-save drop-in.  Installed by deploy/deploy-pi.sh (sync-if-changed,
# restarts NetworkManager only when the content actually differs) to:
#
#     /etc/NetworkManager/conf.d/disable-wifi-powersave.conf
#
# Why (I-025 / US-325, CIO 2026-05-11 WiFi-drop debug):
#   The Pi 5's Broadcom BCM4345/6 is a WiFi+BT combo chip sharing one radio.
#   With WiFi power_save = ON (the Pi 5 default) and the eclipse-obd reconnect
#   heartbeat keeping Bluetooth busy, the combo chip starves WiFi: missed
#   beacons -> power_save engages -> association breaks -> "associating /
#   disconnected / scanning" churn until a manual reconnect.  CIO observed two
#   WiFi drops in three hours on 2026-05-11.  Disabling WiFi power-save is the
#   Pi 5 best-practice fix (Fix #1); US-325's exponential reconnect backoff is
#   Fix #2 (reduce BT activity at the source).
#
# Checked into the repo so a Pi rebuilt from scratch (`deploy/deploy-pi.sh
# --init`) ends up power-save-disabled without any manual intervention -- per
# the CIO 2026-05-11 directive to document the Pi setup changes for a
# from-scratch rebuild.
#
# wifi.powersave values: 0 = use NM default, 1 = ignore (don't touch), 2 =
# disable power-save, 3 = enable power-save.
[connection]
wifi.powersave = 2
